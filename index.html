<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Redirect</title>
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
}

.container{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:15px;
  text-align:center;
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(0,0,0,0.4);
  width:90%;
  max-width:350px;
}

h2{
  font-weight:600;
  margin-bottom:10px;
}

p{
  font-size:14px;
  color:#ccc;
  margin-bottom:20px;
}

.loader{
  border:5px solid rgba(255,255,255,0.1);
  border-top:5px solid #00ffcc;
  border-radius:50%;
  width:40px;
  height:40px;
  margin:20px auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

button{
  background:#00ffcc;
  color:#000;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
  width:100%;
}

button:hover{
  background:#00ccaa;
}

.error{
  color:#ff4d4d;
  font-weight:500;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔐 Secure Redirect</h2>
  <p>Click the button below to continue safely</p>

  <div class="loader"></div>

  <button id="goBtn">Continue</button>

  <p id="msg" class="error"></p>
</div>

<script>
const encoded = new URLSearchParams(window.location.search).get("id");
let finalUrl = "";

if (encoded) {
  try {
    finalUrl = atob(encoded);
  } catch (err) {
    document.getElementById("msg").innerText = "⚠️ Invalid redirect link!";
  }
} else {
  document.getElementById("msg").innerText = "❌ Missing redirect ID!";
}

document.getElementById("goBtn").onclick = function() {
  if (!finalUrl) return;

  // Try to force open in Chrome (Android)
  const chromeUrl = "intent://" + finalUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";

  window.location.href = chromeUrl;

  // Fallback (agar Chrome open nahi hua)
  setTimeout(() => {
    window.location.href = finalUrl;
  }, 1500);
};
</script>

</body>
</html>
